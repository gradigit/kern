name: KernTextKit
options:
  bundleIdPrefix: com.kern.textkit
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.18.9

schemes:
  KernTextKit:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
  KernTextKitUI:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitUITests
  KernTextKitSnapshots:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
  KernTextKitRecordSnapshots:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
        KERN_RECORD_SNAPSHOTS: "1"
  KernTextKitExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
  KernTextKitSnapshotsExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
  KernTextKitRecordSnapshotsExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
        KERN_RECORD_SNAPSHOTS: "1"
  KernTextKitPerf:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_PERF_TESTS: "1"
  KernTextKitUIExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitUITests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"

targets:
  KernTextKit:
    type: application
    platform: macOS
    sources:
      - path: KernApp/Sources
      - path: KernApp/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: KernApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: KernApp/Kern.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.kern.textkit
        PRODUCT_NAME: KernTextKit
        GENERATE_INFOPLIST_FILE: false

  KernTextKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KernTests
    dependencies:
      - target: KernTextKit
      - package: SnapshotTesting
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"

  KernTextKitUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: KernUITests
    dependencies:
      - target: KernTextKit
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
